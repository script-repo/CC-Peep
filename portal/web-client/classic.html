<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>audio-agents · classic</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f17;
        --panel: #141b29;
        --border: #243049;
        --text: #e6edf6;
        --muted: #8b97ad;
        --accent: #4f8cff;
        --ok: #34d399;
        --bad: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 { font-size: 18px; margin: 0; }
      header .dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--muted);
      }
      header .dot.on { background: var(--ok); }
      header .dot.off { background: var(--bad); }
      main { max-width: 880px; margin: 0 auto; padding: 24px; }
      .grid { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
      @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
      }
      .card h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
      label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
      input {
        width: 100%; padding: 8px 10px; border-radius: 8px;
        border: 1px solid var(--border); background: #0e1420; color: var(--text);
      }
      button {
        margin-top: 14px; padding: 9px 16px; border-radius: 8px; cursor: pointer;
        border: 1px solid var(--accent); background: var(--accent); color: #fff; font-weight: 600;
      }
      button.secondary { background: transparent; color: var(--accent); }
      button:disabled { opacity: .5; cursor: not-allowed; }
      ul { list-style: none; margin: 0; padding: 0; }
      li.peer { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
      li.peer:last-child { border-bottom: none; }
      .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #1e2a44; color: var(--accent); }
      .tag.vm { background: #14321f; color: var(--ok); }
      .muted { color: var(--muted); }
      #log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; white-space: pre-wrap; max-height: 220px; overflow:auto; color: var(--muted); }
      .full { grid-column: 1 / -1; }
    </style>
  </head>
  <body>
    <header>
      <span id="status-dot" class="dot off"></span>
      <h1>audio-agents portal</h1>
      <span class="muted" id="status-text">disconnected</span>
      <span style="flex:1"></span>
      <a href="./" style="color:var(--accent);font-size:13px;text-decoration:none;">&larr; Switchboard</a>
    </header>
    <main>
      <div class="grid">
        <section class="card">
          <h2>Session</h2>
          <label for="session">Session id</label>
          <input id="session" value="lab" />
          <label for="name">Display name</label>
          <input id="name" value="browser" />
          <button id="connect">Connect</button>
          <button id="disconnect" class="secondary" disabled>Disconnect</button>
        </section>

        <section class="card">
          <h2>Peers in session</h2>
          <ul id="peers"><li class="muted">not connected</li></ul>
        </section>

        <section class="card full">
          <h2>Audio</h2>
          <p class="muted" id="audio-state">Microphone off. Connect, then start audio to relay PCM with peers.</p>
          <button id="mic" disabled>Start microphone &amp; audio</button>
          <audio id="remote" autoplay></audio>
        </section>

        <section class="card full">
          <h2>Log</h2>
          <div id="log"></div>
        </section>
      </div>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
