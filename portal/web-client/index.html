<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>audio-agents · switchboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f17; --panel: #141b29; --border: #243049;
        --text: #e6edf6; --muted: #8b97ad; --accent: #4f8cff; --ok: #34d399; --bad: #f87171;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg); color: var(--text);
        display: flex; flex-direction: column; height: 100vh;
      }
      header {
        padding: 12px 20px; border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      }
      header h1 { font-size: 16px; margin: 0; }
      header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
      header .dot.on { background: var(--ok); } header .dot.off { background: var(--bad); }
      header .spacer { flex: 1; }
      header a { color: var(--muted); font-size: 12px; text-decoration: none; }
      header a:hover { color: var(--accent); }
      input {
        padding: 6px 9px; border-radius: 7px; border: 1px solid var(--border);
        background: #0e1420; color: var(--text); width: 110px;
      }
      button {
        padding: 7px 13px; border-radius: 7px; cursor: pointer;
        border: 1px solid var(--accent); background: var(--accent); color: #fff; font-weight: 600;
      }
      button.secondary { background: transparent; color: var(--accent); }
      button:disabled { opacity: .5; cursor: not-allowed; }
      .muted { color: var(--muted); font-size: 13px; }
      #stage { flex: 1; position: relative; min-height: 0; }
      #scene { width: 100%; height: 100%; display: block; }
      #hint {
        position: absolute; left: 16px; bottom: 12px; max-width: 520px;
        font-size: 12px; color: var(--muted); pointer-events: none;
        background: rgba(11,15,23,.6); padding: 8px 10px; border-radius: 8px;
      }
      #log {
        position: absolute; right: 12px; top: 12px; width: 320px; max-height: 38%;
        overflow: auto; font-family: ui-monospace, Menlo, monospace; font-size: 11px;
        white-space: pre-wrap; color: var(--muted);
        background: rgba(11,15,23,.7); padding: 8px 10px; border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <span id="status-dot" class="dot off"></span>
      <h1>switchboard</h1>
      <span class="muted" id="status-text">disconnected</span>
      <span class="spacer"></span>
      <input id="session" value="lab" title="session id" />
      <input id="name" value="operator" title="display name" />
      <button id="connect">Connect</button>
      <button id="disconnect" class="secondary" disabled>Disconnect</button>
      <button id="mic" class="secondary" disabled>Start mic + audio</button>
      <a href="./classic.html">classic view</a>
    </header>
    <div id="stage">
      <canvas id="scene"></canvas>
      <div id="hint">
        Drag a <b>patch cable</b> from your <b>MIC</b> to a peer's <b>IN</b> jack to send your
        audio there, and from a peer's <b>OUT</b> jack to your <b>SPK</b> to hear it. Drag a
        plugged cable end off its jack to unplug. Top rail = send, bottom rail = receive.
      </div>
      <div id="log"></div>
    </div>
    <script type="module" src="./switchboard.js"></script>
  </body>
</html>
